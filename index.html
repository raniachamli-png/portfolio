        body {

        /* Glassmorphism Classes */
        .glass { 
            background: rgba(20, 20, 30, 0.6); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }
        .glass-card {
            background: linear-gradient(145deg, rgba(30, 30, 45, 0.6), rgba(15, 15, 25, 0.8));
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        }
        .glass-card:hover {
            transform: translateY(-5px);
            border-color: rgba(9, 66, 47, 0.4);
            box-shadow: 0 10px 30px -10px rgba(16, 185, 129, 0.2);
        }

        /* Neon Text and Shadows */
        .text-gradient {
            background: linear-gradient(to right, #095e41, #047857);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .neon-text-blue { text-shadow: 0 0 15px rgba(11, 123, 86, 0.6); }
        .neon-shadow-blue { box-shadow: 0 0 20px rgba(16, 185, 129, 0.3); }

        ::-webkit-scrollbar { width: 8px; }

        @keyframes blink {

            -webkit-mask-image: linear-gradient(to bottom, black 40%, transparent 100%);
        }
    </style>

                                    <div key={idx} className="glass p-4 rounded-xl text-center">
                                        <h4 className="text-lg font-bold text-white">{lang.lang}</h4>
                                        <p className="text-xs text-neon-blue mt-1 font-semibold">{lang.level}</p>
                                    </div>
                                ))}
                            </div>

                    </div>
                </div>
            </FadeInSection>
        );

        const Certifications = () => (
            <FadeInSection id="certifications" className="py-16">
                <div className="container mx-auto px-6 text-center">
                    <h2 className="font-display text-3xl font-bold mb-10 flex items-center justify-center gap-3">
                        Licenses & <span className="text-gradient">Certifications</span>
                        <img src="https://raw.githubusercontent.com/Tarikul-Islam-Anik/Animated-Fluent-Emojis/master/Emojis/Objects/Military%20Medal.png" alt="Medal" className="w-12 h-12 animate-bounce" />
                    </h2>
                    <div className="flex flex-wrap justify-center gap-6">
                        {certsData.map((cert, idx) => (

                                whileHover={{ y: -5, scale: 1.05 }}
                                className={`relative p-0.5 rounded-xl bg-gradient-to-br ${cert.color}`}
                            >
                                <div className="bg-darker px-6 py-4 rounded-[10px] h-full flex flex-col items-center justify-center min-w-[200px]">
                                    <i className="fa-solid fa-certificate text-2xl mb-3 text-gray-300"></i>
                                    <h4 className="text-sm font-bold text-white mb-1.5">{cert.title}</h4>

                                </div>
                            </motion.div>

        const Contact = () => (

                    <div className="text-center mb-12">
                        <h2 className="font-display text-4xl font-bold mb-4 flex items-center justify-center gap-3">
                            Get In <span className="text-gradient">Touch</span>
                            <img src="https://raw.githubusercontent.com/Tarikul-Islam-Anik/Animated-Fluent-Emojis/master/Emojis/Objects/Telephone%20Receiver.png" alt="Phone" className="w-10 h-10 animate-bounce" style={{ animationDelay: '1s' }} />
                        </h2>
                        <p className="text-gray-400">Let's build something intelligent together.</p>
                    </div>
                    
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-12">
                        <div className="space-y-6">
                            <div className="glass-card p-6 rounded-xl flex items-center gap-5 hover:border-neon-blue transition">
                                <div className="w-12 h-12 rounded-full bg-neon-blue/10 flex items-center justify-center text-neon-blue text-xl">
                                    <i className="fa-solid fa-envelope"></i>
                                </div>
                                <div>
                                    <h4 className="text-sm text-gray-400 mb-1">Email</h4>
                                    <a href="mailto:rania.chamli@etu.uae.ac.ma" className="text-white hover:text-neon-blue font-semibold">rania.chamli@etu.uae.ac.ma</a>
                                </div>
                            </div>
                            
                            <div className="glass-card p-6 rounded-xl flex items-center gap-5 hover:border-neon-purple transition">
                                <div className="w-12 h-12 rounded-full bg-neon-purple/10 flex items-center justify-center text-neon-purple text-xl">
                                    <i className="fa-solid fa-phone"></i>
                                </div>
                                <div>
                                    <h4 className="text-sm text-gray-400 mb-1">Phone</h4>
                                    <a href="tel:0720540875" className="text-white hover:text-neon-purple font-semibold">0720540875</a>
                                </div>
                            </div>

                            <div className="glass-card p-6 rounded-xl flex items-center gap-5 hover:border-blue-500 transition">
                                <div className="w-12 h-12 rounded-full bg-blue-500/10 flex items-center justify-center text-blue-500 text-xl">
                                    <i className="fa-brands fa-linkedin-in"></i>
                                </div>
                                <div>
                                    <h4 className="text-sm text-gray-400 mb-1">LinkedIn</h4>
                                    <a href="https://www.linkedin.com/in/rania-chamli-04212334b" target="_blank" className="text-white hover:text-blue-500 font-semibold text-sm break-all">linkedin.com/in/rania-chamli</a>
                                </div>
                            </div>
                        </div>

                        <form className="glass-card p-8 rounded-2xl flex flex-col gap-4">
                            <div>
                                <label className="block text-xs font-semibold text-gray-400 mb-2 uppercase tracking-wider">Your Name</label>
                                <input type="text" className="w-full bg-dark/50 border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-neon-blue transition" placeholder="John Doe" />
                            </div>
                            <div>
                                <label className="block text-xs font-semibold text-gray-400 mb-2 uppercase tracking-wider">Your Email</label>

                            </div>
                            <div>
                                <label className="block text-xs font-semibold text-gray-400 mb-2 uppercase tracking-wider">Message</label>
                                <textarea rows="4" className="w-full bg-dark/50 border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-neon-blue transition resize-none" placeholder="How can I help you?"></textarea>

                            <button type="button" className="w-full bg-gradient-to-r from-neon-blue to-blue-600 text-darker font-bold py-4 rounded-lg mt-2 hover:shadow-[0_0_20px_rgba(0,243,255,0.4)] transition transform hover:-translate-y-0.5">
                                Send Message <i className="fa-solid fa-paper-plane ml-2"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </FadeInSection>
        );

        const Footer = () => (
            <footer className="py-8 text-center text-sm font-semibold text-gray-500 border-t border-white/5">
                <p>&copy; 2024 Rania Chamli. Designed & Built intelligently.</p>
            </footer>
        );

        const Chatbot = () => {
            const [open, setOpen] = useState(false);
            const [messages, setMessages] = useState([
                { text: "Hi! I'm Rania's virtual assistant. How can I help you learn more about her skills or projects?", isBot: true }
            ]);
            const [input, setInput] = useState("");

            const handleSend = (e) => {
                e.preventDefault();
                if(!input.trim()) return;
                
                const userMsg = input;
                setMessages(prev => [...prev, { text: userMsg, isBot: false }]);
                setInput("");

                // Simple Mock AI Logic
                setTimeout(() => {
                    let botReply = "I'm a simple demo bot! Reach out to Rania directly via the contact form for detailed inquiries.";
                    if(userMsg.toLowerCase().includes("skill") || userMsg.toLowerCase().includes("python")) {
                        botReply = "Rania excels in Python, Machine Learning, Computer Vision, and overall Data Science concepts. Check out the Skills section above!";
                    } else if(userMsg.toLowerCase().includes("project")) {
                        botReply = "She has built impressive projects like an Emotion Detector, Machine Learning Predictor, and Eye Tracking App. They are detailed in the Projects section.";
                    }
                    
                    setMessages(prev => [...prev, { text: botReply, isBot: true }]);
                }, 800);
            };

            return (
                <div className="fixed bottom-6 right-6 z-50">
                    <AnimatePresence>
                        {open && (
                            <motion.div 
                                initial={{ opacity: 0, y: 20, scale: 0.9 }}
                                animate={{ opacity: 1, y: 0, scale: 1 }}
                                exit={{ opacity: 0, y: 20, scale: 0.9 }}
                                className="mb-4 w-80 glass-card rounded-2xl overflow-hidden shadow-2xl border border-gray-700/50 flex flex-col"
                            >
                                <div className="bg-gradient-to-r from-neon-purple to-purple-800 p-4 flex justify-between items-center text-white">
                                    <div className="flex items-center gap-3">
                                        <div className="w-8 h-8 rounded-full bg-white/20 flex items-center justify-center">
                                            <i className="fa-solid fa-robot"></i>
                                        </div>
                                        <h3 className="font-bold text-sm">Rania's AI Bot</h3>
                                    </div>
                                    <button onClick={() => setOpen(false)} className="text-white/70 hover:text-white transition">
                                        <i className="fa-solid fa-xmark"></i>
                                    </button>
                                </div>
                                <div className="h-64 overflow-y-auto p-4 flex flex-col gap-3 bg-darker/90">
                                    {messages.map((msg, i) => (
                                        <div key={i} className={`max-w-[85%] rounded-xl p-3 text-sm ${msg.isBot ? 'bg-gray-800 text-gray-200 self-start rounded-tl-sm' : 'bg-neon-purple/20 text-white self-end rounded-tr-sm border border-neon-purple/30'}`}>
                                            {msg.text}
                                        </div>
                                    ))}
                                </div>
                                <form onSubmit={handleSend} className="p-3 bg-dark border-t border-gray-800 flex gap-2">
                                    <input 
                                        type="text" 
                                        value={input}
                                        onChange={e => setInput(e.target.value)}
                                        placeholder="Ask a question..." 
                                        className="flex-1 bg-gray-800 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:ring-1 focus:ring-neon-purple"
                                    />
                                    <button type="submit" className="bg-neon-purple hover:bg-purple-600 text-white rounded-lg px-3 py-2 transition">
                                        <i className="fa-solid fa-paper-plane text-xs"></i>
                                    </button>
                                </form>
                            </motion.div>
                        )}
                    </AnimatePresence>
                    
                    <button 
                        onClick={() => setOpen(!open)}
                        className={`w-14 h-14 rounded-full flex items-center justify-center text-2xl text-white shadow-[0_0_20px_rgba(188,19,254,0.4)] transition transform hover:scale-110 ${open ? 'bg-gray-800' : 'bg-gradient-to-r from-neon-purple to-purple-600'}`}
                    >
                        <i className={`fa-solid ${open ? 'fa-angle-down' : 'fa-comment-dots'}`}></i>
                    </button>
                </div>
            );
        };

        const FloatingSocials = () => (
            <div className="hidden lg:flex fixed left-6 bottom-0 flex-col gap-5 after:w-px after:h-24 after:bg-gray-600 after:mx-auto after:mt-2 z-40">
                <a href="https://www.linkedin.com/in/rania-chamli-04212334b" target="_blank" className="text-gray-400 hover:text-blue-500 hover:-translate-y-1 transition transform text-xl">
                    <i className="fa-brands fa-linkedin"></i>
                </a>
                <a href="mailto:rania.chamli@etu.uae.ac.ma" className="text-gray-400 hover:text-neon-blue hover:-translate-y-1 transition transform text-xl">
                    <i className="fa-solid fa-envelope"></i>
                </a>
            </div>
        );

        const App = () => {
            const [isDark, setDark] = useState(true); // Default dark theme logic

            useEffect(() => {
                const initTilt = () => {
                    if (window.VanillaTilt) {
                        window.VanillaTilt.init(document.querySelectorAll(".glass-card"), {
                            max: 15,
                            speed: 400,
                            glare: true,
                            "max-glare": 0.2,
                            scale: 1.02
                        });
                    }
                };
                // Initial init
                setTimeout(initTilt, 500);
                // Re-init on click of filters
                window.addEventListener('click', () => setTimeout(initTilt, 400));
            }, []);

            return (
                <div className={`min-h-screen ${isDark ? 'dark' : ''}`}>
                    <NavBar isDark={isDark} setDark={setDark} />
                    <FloatingSocials />
                    <main>
                        <Hero />
                        <About />
                        <Skills />
                        <Projects />
                        <ExperienceEducation />
                        <Certifications />
                        <Contact />
                    </main>
                    <Footer />
                    <Chatbot />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
